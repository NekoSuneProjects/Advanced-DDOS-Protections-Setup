# /etc/fail2ban/filter.d/nginx-ddos.conf
# Catches Layer-7 flood patterns: empty / known-attacker UAs, bursty POSTs
# to login/xmlrpc, and the BOT/KILLER/BYPASS/CFB/STOMP signatures used by
# common attack tools.
[Definition]
failregex = ^<HOST> -.*"(GET|POST|HEAD) .*(/xmlrpc\.php|/wp-login\.php|/login|/admin) HTTP/[12]\.[01]" (200|301|302|401|403)
            ^<HOST> -.*"(GET|POST|HEAD) [^"]*" \d+ \d+ "[^"]*" "(-|.*?(BOT|KILLER|BYPASS|CFB|CFBUAM|STOMP|RHEX|sqlmap|nikto|nmap|masscan|nuclei).*)"$
            ^<HOST> -.*"\s*"\s+\d+\s+\d+\s+"[^"]*"\s+"-"$
            ^<HOST> -.* "POST .*\.(php|asp|aspx|jsp) HTTP/[12]\.[01]" 200 \d+ ".*" ".*"$

ignoreregex =

# Notes:
# - This pairs with the `nginx-ddos` jail in jail.local (maxretry=60 in 30s).
# - Tune `maxretry` if you have legitimate high-rate POST API clients.
