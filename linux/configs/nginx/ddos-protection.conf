# /etc/nginx/conf.d/ddos-protection.conf
# Defensive rate-limit + slowloris + bot drop drop-in.
# Apply per-server: include zones at http{} (this file), then add
#   limit_req zone=req burst=20 nodelay;
#   limit_conn conn 20;
# inside the server{} block.

# ---------- Identity / leak prevention ----------
server_tokens off;
more_clear_headers Server;
more_clear_headers X-Powered-By;

# ---------- Rate-limit zones (10MB ~= 160k IPs each) ----------
limit_req_zone $binary_remote_addr zone=req_general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=req_login:10m   rate=2r/s;
limit_req_zone $binary_remote_addr zone=req_api:10m     rate=20r/s;
limit_conn_zone $binary_remote_addr zone=conn_perip:10m;
limit_conn_zone $server_name        zone=conn_perserver:10m;

# ---------- Slowloris / slow-POST mitigation ----------
client_body_timeout       10s;
client_header_timeout     10s;
send_timeout              10s;
keepalive_timeout         15s;
client_max_body_size      8m;
client_body_buffer_size   128k;
large_client_header_buffers 4 8k;
reset_timedout_connection on;

# ---------- Disable unused HTTP methods ----------
map $request_method $bad_method {
    default              0;
    ~*^(GET|HEAD|POST|PUT|DELETE|OPTIONS|PATCH)$ 0;
    "~*^(TRACE|TRACK|DEBUG|CONNECT)$"            1;
}

# ---------- Bot / attack-tool UA blocklist ----------
# Matches the common L7 attack-tool fingerprints (BOT, KILLER, BYPASS, CFB,
# CFBUAM, STOMP, downloader frameworks, etc.) and empty UAs.
map $http_user_agent $bad_ua {
    default 0;
    ""                                                         1;
    "-"                                                        1;
    "~*(libwww-perl|python-requests|Go-http-client|curl|wget)" 0;  # leave dev tools alone, change to 1 to block
    "~*(masscan|nmap|nikto|sqlmap|fuzzer|nuclei|gobuster)"     1;
    "~*(BOT|KILLER|BYPASS|CFB|CFBUAM|STOMP|RHEX)"              1;
    "~*(ZmEu|Morfeus|jorgee|sqlninja)"                         1;
    "~*(ahrefs|semrush|mj12bot|dotbot)"                        0;  # change to 1 to block SEO crawlers
}

# ---------- Block bogus referers (referer-spam DDoS) ----------
map $http_referer $bad_ref {
    default 0;
    "~*(buttons-for-website|semalt|kambasoft|savetubevideo)" 1;
}

# ---------- Apply maps + drop matching requests ----------
# Add this inside any server{} you want to protect:
#
#   include /etc/nginx/conf.d/ddos-protection.conf;
#   if ($bad_method) { return 405; }
#   if ($bad_ua)     { return 444; }
#   if ($bad_ref)    { return 444; }
#   limit_req  zone=req_general burst=20 nodelay;
#   limit_conn conn_perip      20;
#   limit_conn conn_perserver  4096;
#
# (444 = nginx-specific "drop connection without response" - free CPU.)
