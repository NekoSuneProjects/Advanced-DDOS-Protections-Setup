# /etc/pf.anchors/ddos-protect — loaded by /etc/pf.conf "load anchor"
# Reverse: uninstall.sh removes this file and the anchor line.

table <whitelist> persist file "/etc/ddos-protect/whitelist.txt"
table <bruteforce> persist

# Common amplification source ports to drop (we're not running the matching services).
amp_ports = "{ 19, 53, 123, 389, 1900, 11211, 17, 27015, 7777 }"

# Default: scrub everything, normalise.
scrub on egress all max-mss 1440 random-id reassemble tcp

# Allow loopback and established.
pass in quick on lo0 all
pass in quick from <whitelist> to any keep state

# Brute-forcers go to the table — auto-blocked.
block in quick from <bruteforce>

# Rate-limit SSH (5 conn / 30s per src).
pass in quick proto tcp from any to any port 22 \
    flags S/SA keep state \
    (max-src-conn 10, max-src-conn-rate 5/30, overload <bruteforce> flush global)

# Rate-limit HTTP / HTTPS.
pass in quick proto tcp from any to any port { 80, 443 } \
    flags S/SA keep state \
    (max-src-conn 60, max-src-conn-rate 100/10)

# Drop ICMP smurf + bogus.
block in quick proto icmp from any to 255.255.255.255
block in quick proto icmp icmp-type { redir, timex, source-quench }

# Drop inbound UDP from known amp source ports.
block in quick proto udp from any port $amp_ports

# Drop fragments.
block in quick all fragment
